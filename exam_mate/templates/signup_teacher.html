<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Signup - ExamMate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .signup-container {
      max-width: 420px;
      margin: 80px auto;
      padding: 35px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    h3 {
      text-align: center;
      margin-bottom: 25px;
      color: #007bff;
      font-weight: 600;
    }
    .btn-primary {
      background-color: #007bff;
      border: none;
    }
    .btn-primary:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h3>Teacher Signup</h3>

    {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('signup_teacher') }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" placeholder="Enter your name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Create password" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Authorization Code</label>
        <input type="text" class="form-control" name="secret_code" placeholder="Enter Teacher Code (EXAMMATE2025)" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Sign Up as Teacher</button>

      <div class="text-center mt-3">
        <a href="{{ url_for('home') }}">Already have an account? Login</a>
      </div>
      <div class="text-center mt-2">
        <a href="{{ url_for('signup_choice') }}" class="text-decoration-none">Choose a different user type</a>
      </div>
    </form>
  </div>
</body>
</html>
