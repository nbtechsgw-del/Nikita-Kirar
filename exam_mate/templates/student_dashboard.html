<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard | ExamMate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }
    .navbar {
      background-color: #0d6efd;
    }
    .card {
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🎓 ExamMate | Student Panel</span>
      <div>
        <span class="text-white me-3">Welcome, {{ username }}</span>
        <a href="/logout" class="btn btn-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row g-4">

      <!-- Start Exam -->
      <div class="col-md-4">
        <div class="card shadow-sm text-center p-4">
          <h4>📝 Take Exam</h4>
          <p>Start your available tests</p>
          <a href="/student/available_exams" class="btn btn-primary">Start Exam</a>
        </div>
      </div>

      <!-- View Results -->
      <div class="col-md-4">
        <div class="card shadow-sm text-center p-4">
          <h4>📊 My Results</h4>
          <p>Check your previous exam scores</p>
          <a href="/results" class="btn btn-success">View Results</a>
        </div>
      </div>

      <!-- Profile -->
      <div class="col-md-4">
        <div class="card shadow-sm text-center p-4">
          <h4>👤 My Profile</h4>
          <p>View or update your personal info</p>
          <a href="/profile" class="btn btn-secondary">View Profile</a>
        </div>
      </div>
    </div>

    <!-- Optional Graph Section -->
    <div class="mt-5">
      <h4>Your Performance Overview</h4>
      <canvas id="scoreChart" height="100"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('scoreChart');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Python', 'DBMS', 'AI', 'Networking'],
        datasets: [{
          label: 'Scores',
          data: [85, 90, 75, 95],
          borderWidth: 1,
          backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545']
        }]
      },
      options: { scales: { y: { beginAtZero: true } } }
    });
  </script>
</body>
</html>
